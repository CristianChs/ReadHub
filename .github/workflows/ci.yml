name: CI

# Validación completa del monorepo. NO despliega nada: no hay ningún job de
# deploy, ni credenciales de producción, ni acceso a la infraestructura real.
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

# Un push nuevo sobre la misma rama cancela la ejecución anterior: no tiene
# sentido gastar minutos en un resultado que ya quedó obsoleto.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Solo lectura del repositorio. El pipeline no escribe nada en GitHub.
permissions:
  contents: read

env:
  # Debe coincidir con el Node del entorno de desarrollo (v24), para que CI y la
  # máquina del equipo ejecuten el MISMO runtime. Una diferencia aquí es la
  # receta del clásico "en mi máquina funciona": un fallo que solo aparece en CI
  # (o al revés) y que cuesta horas localizar.
  NODE_VERSION: "24"
  # Debe coincidir con "packageManager" en package.json. actions/setup-node no
  # fija la versión de npm por sí solo: usa la que venga con el Node resuelto,
  # que avanza con el tiempo. Sin este pin, `npm ci` puede fallar con
  # "Missing: ... from lock file" en cuanto un npm más nuevo resuelva alguna
  # dependencia opcional transitiva distinta a como quedó grabada en el lockfile.
  NPM_VERSION: "11.16.0"

jobs:
  # ==========================================================================
  # 1. Validación estática y pruebas unitarias. Rápido y sin Docker: si esto
  #    falla, no merece la pena levantar Supabase ni un navegador.
  # ==========================================================================
  checks:
    name: TypeScript, ESLint y Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Cachea ~/.npm a partir del hash de package-lock.json.
          cache: npm

      # Caché del filesystem cache de Turborepo. Turbo decide acierto/fallo por
      # hash del contenido real, así que una clave amplia con `restore-keys` es
      # segura: en el peor caso no acelera nada, pero nunca sirve un resultado
      # obsoleto.
      - name: Restaurar caché de Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Fijar la versión de npm (coincide con packageManager)
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Instalar dependencias (npm workspaces)
        run: npm ci

      # `turbo run typecheck` -> tsc --noEmit en los 8 paquetes del monorepo.
      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      # `vitest run --coverage` desde la raíz: ejecuta los 6 proyectos (shared,
      # ai, services, rag, web, mcp) en una sola pasada y deja UN informe de
      # cobertura consolidado en ./coverage.
      - name: Vitest (con cobertura)
        run: npm run test:coverage

      - name: Publicar cobertura como artefacto
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 7
          if-no-files-found: warn

  # ==========================================================================
  # 2. End-to-end con Playwright, contra un Supabase LOCAL y efímero levantado
  #    dentro del propio runner (Supabase CLI + Docker, ya preinstalado en los
  #    runners ubuntu-latest).
  #
  #    Esto es lo que permite cumplir "no incluir credenciales sensibles": el
  #    login real de auth.spec.ts se autentica contra usuarios sembrados por
  #    supabase/seed.sql, y las claves que emite un stack local de Supabase son
  #    públicas e idénticas en cualquier máquina. No hace falta ni un secreto, y
  #    el stack entero muere con el runner.
  # ==========================================================================
  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restaurar caché de Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Fijar la versión de npm (coincide con packageManager)
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Instalar dependencias (npm workspaces)
        run: npm ci

      # Los navegadores pesan ~150 MB y no cambian entre commits: se cachean por
      # la versión de Playwright que fija el lockfile.
      - name: Restaurar caché de navegadores de Playwright
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Solo Chromium: mantiene el job rápido. Firefox y WebKit quedan
      # disponibles para ejecutarlos en local. `--with-deps` instala también las
      # librerías de sistema que el navegador necesita en Ubuntu.
      - name: Instalar navegador de Playwright (Chromium)
        run: npm run test:e2e:install

      # La versión va FIJADA, no en "latest", por dos motivos:
      #
      #   1. `latest` obliga a la acción a preguntarle a la API de GitHub cuál es
      #      la última release, sin autenticar. Los runners comparten IP, así que
      #      ese límite se agota a menudo y el job muere con
      #      "Failed to resolve latest Supabase CLI release: rate limit exceeded".
      #      Fijando la versión no hay consulta que hacer.
      #   2. Determinismo: con `latest`, una release nueva de la CLI podía cambiar
      #      el comportamiento del CI sin que nadie tocara una línea del proyecto.
      #
      # Para actualizarla: https://github.com/supabase/cli/releases
      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      # `supabase/config.toml` ya está versionado, así que este paso NO hace nada
      # en condiciones normales: el stack local queda definido por el fichero del
      # repositorio, no por lo que decida generar el runner. Se conserva como red
      # de seguridad —si alguien lo borrara, el job seguiría arrancando— pero la
      # configuración reproducible es la versionada.
      - name: Inicializar la configuración local de Supabase (red de seguridad)
        run: |
          if [ ! -f supabase/config.toml ]; then
            supabase init
          fi

      - name: Levantar Supabase local
        run: supabase start

      # Aplica supabase/migrations/* y siembra supabase/seed.sql, que crea los
      # usuarios de prueba (writer1@readhub.test…) con los que se autentica el E2E.
      - name: Aplicar migraciones y datos sembrados
        run: supabase db reset

      # Credenciales del stack efímero de ESTE job, no secretos del proyecto: se
      # leen en caliente en vez de fijarlas en el workflow.
      - name: Leer credenciales del Supabase local
        id: supabase
        run: |
          STATUS=$(supabase status -o json)
          echo "api_url=$(echo "$STATUS" | jq -r '.API_URL')" >> "$GITHUB_OUTPUT"
          echo "anon_key=$(echo "$STATUS" | jq -r '.ANON_KEY')" >> "$GITHUB_OUTPUT"

      # El build vive en un paso PROPIO, no dentro de `webServer.command` de
      # Playwright. Si la compilación falla, aquí se ve el error real (TypeScript,
      # Next, lo que sea); metido dentro de Playwright se reportaba como un
      # críptico "webServer was not able to start. Exit code: 1", y además competía
      # con el timeout de arranque del servidor.
      #
      # Las variables NEXT_PUBLIC_* se necesitan ya en tiempo de compilación: Next
      # las incrusta en el bundle del cliente.
      - name: Build de producción
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
        run: npm run build

      # Playwright ya solo arranca el servidor de producción (`next start`) y
      # ejecuta las pruebas.
      #
      # No se definen E2E_USER_EMAIL/PASSWORD: los valores por defecto de
      # e2e/data/users.ts apuntan al usuario que siembra supabase/seed.sql.
      - name: Ejecutar pruebas E2E
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
        run: npx playwright test --project=chromium

      # El reporter "github" (que playwright.config.ts activa cuando CI=true)
      # ya anota cada fallo sobre el diff del PR. Esto sube, además, el informe
      # HTML navegable con los screenshots, los vídeos y las trazas de los
      # fallos, más el junit.xml. Solo cuando algo ha fallado: una ejecución en
      # verde no genera artefactos.
      - name: Publicar reporte de Playwright (solo si falló)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            apps/web/e2e/playwright-report/
            apps/web/e2e/test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Detener Supabase local
        if: always()
        run: supabase stop

  # ==========================================================================
  # 3. Rendimiento. Se ejecuta SOLO si `checks` y `e2e` pasaron: no tiene
  #    sentido medir la velocidad de una aplicación que todavía no se sabe si
  #    es correcta. Un LCP excelente sobre una pantalla rota no vale nada.
  #
  #    Este job es el GATE de despliegue: si el presupuesto de bundle o las
  #    auditorías de Lighthouse no se cumplen, `deploy` no llega a arrancar.
  # ==========================================================================
  performance:
    name: Rendimiento (bundle + Lighthouse)
    runs-on: ubuntu-latest
    needs: [checks, e2e]
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Fijar la versión de npm (coincide con packageManager)
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Instalar dependencias (npm workspaces)
        run: npm ci

      # Lighthouse necesita un Chrome real. En vez de confiar en el que traiga
      # la imagen del runner (que cambia sin avisar), se reutiliza el Chromium
      # que Playwright ya fija por lockfile: misma versión aquí y en local, y
      # una medición no es comparable si el navegador cambia entre ejecuciones.
      - name: Restaurar caché de navegadores de Playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar Chromium
        run: npm run test:e2e:install

      - name: Resolver la ruta de Chrome para Lighthouse
        working-directory: apps/web
        run: |
          CHROME=$(node -e "console.log(require('playwright-core').chromium.executablePath())")
          echo "CHROME_PATH=$CHROME" >> "$GITHUB_ENV"
          echo "Chrome: $CHROME"

      # El build de producción es el ARTEFACTO QUE SE MIDE. Se compila una sola
      # vez y de él salen las tres cosas: el treemap del analizador, el
      # presupuesto de bundle y el servidor que audita Lighthouse.
      #
      # Las claves apuntan a un Supabase inexistente a propósito: las pantallas
      # auditadas (/login, /register) son públicas y no consultan datos. Lo que
      # se mide es el coste de entrega —JS, CSS, fuentes, imágenes—, que no
      # depende de la base. Ver la nota sobre cobertura en el informe.
      - name: Build de producción (con analizador de bundle)
        working-directory: apps/web
        env:
          ANALYZE: "true"
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-lighthouse-anon-key"
        run: npm run build

      # Control 1 — Presupuesto de bundle. Falla si alguna ruta supera el
      # límite de First Load JS (gzip). Detecta una regresión de peso ANTES de
      # que llegue a notarse en la puntuación de Lighthouse.
      - name: Presupuesto de bundle
        working-directory: apps/web
        run: npm run bundle:budget -- --budget-kb 220 --json bundle-report.json

      # Control 2 — Lighthouse. Levanta `next start`, audita las rutas públicas
      # 3 veces cada una (la mediana absorbe el ruido del runner) y verifica los
      # umbrales de lighthouserc.json. Falla el job si no se cumplen.
      - name: Auditoría de Lighthouse
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-lighthouse-anon-key"
        run: npm run lighthouse

      # Se publica SIEMPRE, también (y sobre todo) cuando el job ha fallado:
      # el informe es justamente lo que explica por qué no se cumplió el umbral.
      - name: Publicar reporte de rendimiento
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: performance-report
          path: |
            apps/web/lighthouse-report/
            apps/web/bundle-report.json
            apps/web/.next/analyze/
          retention-days: 14
          if-no-files-found: warn

  # ==========================================================================
  # 4. Despliegue a Vercel. Depende de TODO lo anterior: tipos, lint, unitarias,
  #    E2E, presupuesto de bundle y Lighthouse. Si cualquiera falla, este job
  #    ni siquiera se encola — ese es el bloqueo pedido.
  #
  #    Solo se despliega a producción en push a main. Un Pull Request ejecuta
  #    todas las validaciones (incluidas las de rendimiento) pero NO publica:
  #    el pipeline le dice al autor si su rama es desplegable, sin desplegarla.
  # ==========================================================================
  deploy:
    name: Desplegar en Vercel (producción)
    runs-on: ubuntu-latest
    needs: [checks, e2e, performance]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Sin las credenciales, el job se detiene con un mensaje claro en vez de
      # fallar veinte líneas más abajo con un error críptico de la CLI.
      - name: Verificar credenciales de Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ]      && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_ORG_ID" ]     && missing="$missing VERCEL_ORG_ID"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secretos de Vercel:$missing"
            echo "Configúralos en Settings > Secrets and variables > Actions."
            exit 1
          fi

      # El build ocurre EN VERCEL, no aquí. La alternativa (`vercel pull` +
      # `vercel build` + `deploy --prebuilt`) permitiría desplegar el binario
      # exacto que auditó el job anterior, pero es inviable con este proyecto:
      #
      #   Las variables NEXT_PUBLIC_* de Vercel están marcadas como "Sensitive",
      #   y una variable Sensitive es de SOLO ESCRITURA: `vercel pull` no puede
      #   leerla (y Vercel no permite revertir esa marca una vez guardada). El
      #   build del runner salía entonces con `undefined` incrustado —Next fija
      #   las NEXT_PUBLIC_* en tiempo de compilación—, el middleware llamaba a
      #   createBrowserClient(undefined, undefined) y TODA la app respondía 500
      #   (MIDDLEWARE_INVOCATION_FAILED), pese a que el despliegue salía "Ready".
      #
      # Compilando en Vercel el problema no puede reaparecer: el build vive
      # donde viven las variables. Se recompila el mismo commit ya auditado, y
      # el pipeline sigue siendo la puerta: este job solo existe si `checks`,
      # `e2e` y `performance` pasaron.
      - name: Desplegar
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          URL=$(npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "::notice::Desplegado en $URL"
